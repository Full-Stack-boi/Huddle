<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huddle – Watch Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: #FFF8F0;
      color: #1E293B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #FFFFFF;
      border: 3px solid #1E293B;
      border-radius: 16px;
      box-shadow: 4px 4px 0px #1E293B;
      padding: 40px;
      max-width: 400px;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    h1 { margin-top: 0; color: #8B5CF6; }
    p { color: #475569; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 24px;
      background: #06B6D4;
      color: white;
      text-decoration: none;
      font-weight: 700;
      border: 3px solid #1E293B;
      border-radius: 12px;
      box-shadow: 4px 4px 0px #1E293B;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px #1E293B;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎬</div>
    <h1>Huddle</h1>
    <p>Sync your screens, share the moment.</p>
    <p>To join a watch party, please use the specific room link provided by your host.</p>
    <a href="/room/HUD-TEST" class="btn">View Sample Room</a>
  </div>
</body>
</html>
